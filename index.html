    sop_client: Object.entries(CLIENT_SOP_DAYS).map(([day,acts])=>({name:day,activities:acts})),
  };
}

function openSettings(){
  settingsDraft = getDefaultSettings();
  // Merge saved settings if available
  if(state.savedSettings){
    for(const k of Object.keys(settingsDraft)){
      if(state.savedSettings[k]) settingsDraft[k] = JSON.parse(JSON.stringify(state.savedSettings[k]));
    }
  }
  settingsOpen = true;
  renderSettingsPanel();
}

function closeSettings(){
  settingsOpen = false;
  const overlay = document.getElementById('settings-overlay');
  const panel = document.getElementById('settings-panel');
  if(overlay) overlay.classList.remove('open');
  if(panel) panel.classList.remove('open');
  setTimeout(()=>{
    if(overlay) overlay.remove();
    if(panel) panel.remove();
  }, 250);
}

function renderSettingsPanel(){
  const existingPanel = document.getElementById('settings-panel');
  const existingOverlay = document.getElementById('settings-overlay');
  
  // Save scroll position before re-render
  let savedScroll = 0;
  if(existingPanel){
    const body = existingPanel.querySelector('.settings-body');
    if(body) savedScroll = body.scrollTop;
  }

  // Remove existing
  if(existingOverlay) existingOverlay.remove();
  if(existingPanel) existingPanel.remove();
  
  const overlay = document.createElement('div');
  overlay.id='settings-overlay';
  overlay.className='settings-overlay';
  overlay.onclick=closeSettings;
  document.body.appendChild(overlay);

  const panel = document.createElement('div');
  panel.id='settings-panel';
  panel.className='settings-panel';
  panel.onclick=e=>e.stopPropagation();

  let h=`<div class="settings-header">
    <h3>⚙️ Settings</h3>
    <button class="modal-close" onclick="closeSettings()">×</button>
  </div>
  <div class="settings-tab-bar">
    <button class="settings-tab ${settingsTab==='stages'?'active':''}" onclick="settingsTab='stages';renderSettingsPanel()">Pipeline Stages</button>
    <button class="settings-tab ${settingsTab==='activities'?'active':''}" onclick="settingsTab='activities';renderSettingsPanel()">Activity Types</button>
    <button class="settings-tab ${settingsTab==='sop'?'active':''}" onclick="settingsTab='sop';renderSettingsPanel()">SOP Sequences</button>
    <button class="settings-tab ${settingsTab==='clients'?'active':''}" onclick="settingsTab='clients';renderSettingsPanel()">Clients</button>
    <button class="settings-tab ${settingsTab==='users'?'active':''}" onclick="settingsTab='users';renderSettingsPanel()">Users</button>
  </div>
  <div class="settings-body">`;

  if(settingsTab==='stages') h+=renderStagesSettings();
  else if(settingsTab==='activities') h+=renderActivityTypesSettings();
  else if(settingsTab==='sop') h+=renderSopSettings();
  else if(settingsTab==='clients') h+=renderClientsSettings();
  else if(settingsTab==='users') h+=renderUsersSettings();

  h+=`</div>
  <div class="settings-footer">
    <button class="btn" style="background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb" onclick="closeSettings()">Cancel</button>
    <button class="btn btn-primary" onclick="saveSettingsToSheet()">💾 Save Settings</button>
    <span id="settings-autosave-status" style="font-size:10px;color:#9ca3af;align-self:center;margin-left:8px"></span>
  </div>`;

  panel.innerHTML=h;
  document.body.appendChild(panel);

  // Restore scroll position
  if(savedScroll > 0){
    const body = panel.querySelector('.settings-body');
    if(body) body.scrollTop = savedScroll;
  }

  // Animate open
  requestAnimationFrame(()=>{
    overlay.classList.add('open');
    panel.classList.add('open');
  });

  // Setup drag-and-drop for lists
  setupSettingsDrag();
}

// Auto-save: debounce to avoid hammering the API on every keystroke
let _autoSaveTimer = null;
function debouncedAutoSave(){
  clearTimeout(_autoSaveTimer);
  const statusEl = document.getElementById('settings-autosave-status');
  if(statusEl) statusEl.textContent = 'Unsaved changes...';
  _autoSaveTimer = setTimeout(async ()=>{
    try{
      applySettings(settingsDraft);
      const clientUpdates = state.clients.filter(c=>c.id).map(c=>({
        id:c.id,
        notifyEmails:str(c.notifyEmails),
        campaignKeywords:str(c.campaignKeywords),
        contactFirstName:str(c.contactFirstName),
        calendlyUrl:str(c.calendlyUrl),
        enableForward:str(c.enableForward),
        enableCalendly:str(c.enableCalendly),
        enableCopyInfo:str(c.enableCopyInfo),
        enableTracker:str(c.enableTracker),
        leadCost:str(c.leadCost),
        serviceAreaUrl:str(c.serviceAreaUrl)
      }));
      await Promise.all([
        apiPost('save_settings',{settings:settingsDraft}),
        apiPost('batch_update_clients',{clients:clientUpdates})
      ]);
      const s = document.getElementById('settings-autosave-status');
      if(s) s.textContent = '✓ Auto-saved';
      setTimeout(()=>{ const s2=document.getElementById('settings-autosave-status'); if(s2 && s2.textContent==='✓ Auto-saved') s2.textContent=''; }, 2000);
    }catch(e){
      const s = document.getElementById('settings-autosave-status');
      if(s) s.textContent = '⚠ Save failed';
    }
  }, 1500);
}

function setupSettingsDrag(){
  document.querySelectorAll('.settings-list').forEach(list=>{
    const key=list.dataset.key;
    let dragIdx=null;
    list.querySelectorAll('.settings-list-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{
        dragIdx=parseInt(item.dataset.idx);
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
      });
      item.addEventListener('dragend',()=>{
        item.classList.remove('dragging');
        dragIdx=null;
      });
      item.addEventListener('dragover',e=>{
        e.preventDefault();
        e.dataTransfer.dropEffect='move';
      });
      item.addEventListener('drop',e=>{
        e.preventDefault();
        const dropIdx=parseInt(item.dataset.idx);
        if(dragIdx!==null && dragIdx!==dropIdx && settingsDraft[key]){
          const arr=settingsDraft[key];
          const [moved]=arr.splice(dragIdx,1);
          arr.splice(dropIdx,0,moved);
          renderSettingsPanel();
        }
      });
    });
  });
}

function applySettings(s){
  state.savedSettings = s;
  // Apply stages
  if(s.acquisition_stages){
    ACQUISITION_STAGES.length=0;
    s.acquisition_stages.forEach(st=>ACQUISITION_STAGES.push({id:st.id||st.label,label:st.label,color:st.color}));
  }
  if(s.nurture_stages){
    NURTURE_STAGES.length=0;
    s.nurture_stages.forEach(st=>NURTURE_STAGES.push({id:st.id||st.label,label:st.label,color:st.color}));
  }
  // Apply activity types
  if(s.activity_types){
    ACTIVITY_TYPES.length=0;
    s.activity_types.forEach(t=>{
      ACTIVITY_TYPES.push(t.name);
      ACTIVITY_ICONS[t.name]=t.icon||'✓';
    });
  }
  // Apply SOP sequences
  if(s.sop_acquisition){
    // Clear and rebuild SOP_DAYS
    Object.keys(SOP_DAYS).forEach(k=>delete SOP_DAYS[k]);
    s.sop_acquisition.forEach(seq=>{
      SOP_DAYS[seq.name]=seq.activities.map(a=>({type:a.type,subject:a.subject}));
    });
  }
  if(s.sop_client){
    Object.keys(CLIENT_SOP_DAYS).forEach(k=>delete CLIENT_SOP_DAYS[k]);
    s.sop_client.forEach(seq=>{
      CLIENT_SOP_DAYS[seq.name]=seq.activities.map(a=>({type:a.type,subject:a.subject}));
    });
  }
  // Apply client Calendly URLs
  if(s.clientCalendlyUrls){
    try{
      const urls=typeof s.clientCalendlyUrls==='string'?JSON.parse(s.clientCalendlyUrls):s.clientCalendlyUrls;
      if(Array.isArray(urls)){
        for(const u of urls){
          const c=state.clients.find(x=>x.name===u.name);
          if(c){ if(u.calendlyUrl) c.calendlyUrl=u.calendlyUrl; if(u.color) c.color=u.color; }
        }
      }
    }catch(e){}
  }
}

function updateClientCalendly(name, url){
  const c=state.clients.find(x=>x.name===name);
  if(c) c.calendlyUrl=url;
}

function updateClientField(clientId, field, value){
  const c=state.clients.find(x=>str(x.id)===str(clientId));
  if(c) c[field]=value;
}

function captureClientInputs(){
  const panel=document.querySelector('.settings-body');
  if(!panel) return;
  for(const c of state.clients){
    const id=c.id;
    panel.querySelectorAll('input[type="text"]').forEach(inp=>{
      const handler=inp.getAttribute('oninput')||'';
      const match=handler.match(/updateClientField\('([^']+)','([^']+)'/);
      if(match && match[1]===id){
        c[match[2]]=inp.value;
      }
    });
    panel.querySelectorAll('input[type="checkbox"]').forEach(inp=>{
      const handler=inp.getAttribute('onchange')||'';
      const match=handler.match(/toggleClientField\('([^']+)','([^']+)'/);
      if(match && match[1]===id){
        c[match[2]]=inp.checked?'TRUE':'FALSE';
      }
    });
  }
}

function toggleClientField(clientId, field, checked){
  // Capture ALL current input values before re-rendering so nothing gets lost
  captureClientInputs();
  const c=state.clients.find(x=>str(x.id)===str(clientId));
  if(c){
    c[field]=checked?'TRUE':'FALSE';
  }
  const body=document.querySelector('.settings-body');
  if(body) body.innerHTML=renderClientsSettings();
}

async function saveSettingsToSheet(){
  captureClientInputs();
  applySettings(settingsDraft);
  render();
  const btn=document.querySelector('.settings-footer .btn-primary');
  if(btn){ btn.textContent='Saving...'; btn.disabled=true; }
  try {
    // Build client batch data
    const clientUpdates = state.clients.filter(c=>c.id).map(c=>({
      id:c.id,
      notifyEmails:str(c.notifyEmails),
      campaignKeywords:str(c.campaignKeywords),
      contactFirstName:str(c.contactFirstName),
      calendlyUrl:str(c.calendlyUrl),
      enableForward:str(c.enableForward),
      enableCalendly:str(c.enableCalendly),
      enableCopyInfo:str(c.enableCopyInfo),
      enableTracker:str(c.enableTracker),
      leadCost:str(c.leadCost),
      serviceAreaUrl:str(c.serviceAreaUrl)
    }));
    // Fire both in parallel — settings + all clients in one batch call
    await Promise.all([
      apiPost('save_settings',{settings:settingsDraft}),
      apiPost('batch_update_clients',{clients:clientUpdates})
    ]);
    if(btn){ btn.textContent='✓ Saved!'; }
    setTimeout(closeSettings, 800);
  } catch(e){
    if(btn){ btn.textContent='Error — Retry'; btn.disabled=false; }
  }
}

async function changeUserRole(uid, role){
  await updateUserRole(uid, role);
  loadUsersIntoPanel();
}
async function changeUserClient(uid, clientName){
  await updateUserClient(uid, clientName);
  loadUsersIntoPanel();
}

async function createNewUser(){
  const name = document.getElementById('new-user-name').value.trim();
  const email = document.getElementById('new-user-email').value.trim();
  const pass = document.getElementById('new-user-pass').value;
  const role = document.getElementById('new-user-role').value;
  const clientName = document.getElementById('new-user-client').value;
  const btn = document.getElementById('create-user-btn');
  const msg = document.getElementById('create-user-msg');
  
  if(!name||!email||!pass){ msg.textContent='Please fill in all fields'; msg.style.color='var(--red)'; msg.style.display='block'; return; }
  if(pass.length<6){ msg.textContent='Password must be at least 6 characters'; msg.style.color='var(--red)'; msg.style.display='block'; return; }
  
  btn.disabled=true; btn.textContent='Creating...';
  msg.style.display='none';
  
  try {
    // Save current user session
    const currentEmail = currentUser.email;
    
    // Create the new user in Firebase Auth
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    
    // Create Firestore doc
    await db.collection('users').doc(cred.user.uid).set({
      name,
      email,
      role,
      clientName,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Sign back in as admin (creating a user signs you in as them)
    // The admin needs to re-authenticate
    msg.textContent='✓ Account created for '+name+'! Sign back in to continue.';
    msg.style.color='var(--green)';
    msg.style.display='block';
    
    // Clear form
    document.getElementById('new-user-name').value='';
    document.getElementById('new-user-email').value='';
    document.getElementById('new-user-pass').value='';
    
    btn.textContent='Create User Account';
    btn.disabled=false;
    
    // The auth state change will trigger — admin needs to log back in
    // This is a known Firebase client-side limitation
    // In future we can use a Cloud Function to create users without switching auth
  } catch(e){
    let errMsg='Failed to create account';
    if(e.code==='auth/email-already-in-use') errMsg='An account with this email already exists';
    else if(e.code==='auth/invalid-email') errMsg='Invalid email address';
    msg.textContent=errMsg;
    msg.style.color='var(--red)';
    msg.style.display='block';
    btn.textContent='Create User Account';
    btn.disabled=false;
  }
}

// ─── Client Archive Viewer ───
function openClientArchive(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = ()=>overlay.remove();
  
  let h = `<div class="modal" style="width:520px;max-height:80vh" onclick="event.stopPropagation()">
    <div class="modal-header"><h3>📦 Archived Leads</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
    <div class="modal-body" style="max-height:60vh;overflow-y:auto">`;
  
  if(clientArchivedDeals.length === 0){
    h += `<div style="text-align:center;padding:30px;color:var(--text-muted)">No archived leads yet.<br><span style="font-size:11px">Drag a lead to "Archive" or "Won" to move it here.</span></div>`;
  } else {
    for(const deal of clientArchivedDeals){
      const reason = deal.archiveReason === 'won' ? '✅ Won' : '📦 Archived';
      const date = deal.archivedAt ? new Date(deal.archivedAt).toLocaleDateString() : '';
      h += `<div style="display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:6px;background:#f9fafb;border:1px solid var(--border);border-radius:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${esc(deal.company||deal.contact||'Unknown')}</div>
          <div style="font-size:11px;color:var(--text-muted)">${esc(deal.email||'')} ${deal.phone?'· '+esc(deal.phone):''}</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${reason} · ${date}</div>
        </div>
        <button class="btn btn-primary" style="font-size:11px;padding:5px 12px;flex-shrink:0" onclick="restoreDeal('${deal.id}');this.closest('.modal-overlay').remove()">Restore</button>
      </div>`;
    }
  }
  h += `</div></div>`;
  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}

// ─── Client Stage Settings ───
function openClientStageSettings(){
  const overlay = document.createElement('div');
  overlay.id = 'client-stage-overlay';
  overlay.className = 'modal-overlay';
  overlay.onclick = ()=>overlay.remove();
  
  renderClientStageSettingsInner(overlay);
  document.body.appendChild(overlay);
}

function renderClientStageSettingsInner(overlay){
  if(!overlay) overlay = document.getElementById('client-stage-overlay');
  if(!overlay) return;
  
  const stages = clientPortalStages || DEFAULT_CLIENT_STAGES;
  const colors = ['#7c3aed','#2563eb','#d97706','#059669','#ef4444','#0891b2','#6366f1','#dc2626','#15803d','#b45309'];
  
  let h = `<div class="modal" style="width:420px" onclick="event.stopPropagation()">
    <div class="modal-header"><h3>⚙️ Pipeline Stages</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
    <div class="modal-body">
      <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px">Customize your pipeline stages. Drag to reorder.</p>
      <div id="client-stages-list">`;
  
  for(let i=0;i<stages.length;i++){
    h += `<div style="display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:4px;background:#f9fafb;border:1px solid var(--border);border-radius:6px">
      <span style="color:#d1d5db;cursor:grab">⠿</span>
      <input type="color" value="${stages[i].color}" style="width:24px;height:24px;border:none;cursor:pointer;background:none" onchange="clientPortalStages[${i}].color=this.value">
      <input type="text" value="${esc(stages[i].label)}" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:var(--font)" onchange="clientPortalStages[${i}].label=this.value;clientPortalStages[${i}].id=this.value">
      ${stages.length>1?`<button style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:16px" onclick="clientPortalStages.splice(${i},1);renderClientStageSettingsInner()">×</button>`:''}
    </div>`;
  }
  
  h += `</div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <input type="text" id="new-client-stage-name" placeholder="New stage name" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font)">
        <button class="btn btn-primary" style="font-size:11px" onclick="addClientStage()">+ Add</button>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end">
      <button class="btn" style="background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="saveClientStagesAndClose()">Save Stages</button>
    </div>
  </div>`;
  
  overlay.innerHTML = h;
}

function addClientStage(){
  const input = document.getElementById('new-client-stage-name');
  const name = input.value.trim();
  if(!name) return;
  const colors = ['#7c3aed','#2563eb','#d97706','#059669','#ef4444','#0891b2'];
  clientPortalStages.push({ id: name, label: name, color: colors[clientPortalStages.length % colors.length] });
  input.value = '';
  renderClientStageSettingsInner();
}

async function saveClientStagesAndClose(){
  await saveClientPortalStages(clientPortalStages);
  const overlay = document.getElementById('client-stage-overlay');
  if(overlay) overlay.remove();
  render();
}

// ─── Init ───
let appInitialized=false;
async function initApp(){
  if(appInitialized) return;
  appInitialized=true;
  if(isClient()){
    await loadClientPortalStages();
    await loadClientArchive();
  }
  render();
  syncFromSheet();
  setInterval(syncFromSheet, SYNC_INTERVAL);
  // Load rerun data if starting on that tab
  if(state.pipeline==='nurture' && state.nurtureSubTab==='rerun') loadRerunData();
}
// Auth onAuthStateChanged handles calling initApp()
</script>
