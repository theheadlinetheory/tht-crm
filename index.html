<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Headline Theory — CRM</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23059669'/%3E%3Cstop offset='1' stop-color='%230d9488'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Ctext x='16' y='22.5' text-anchor='middle' font-family='system-ui' font-weight='800' font-size='17' fill='white'%3ET%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23059669'/%3E%3Ctext x='90' y='125' text-anchor='middle' font-family='system-ui' font-weight='800' font-size='100' fill='white'%3ET%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><span>T</span></div>
      <h1>The Headline Theory</h1>
      <p id="login-subtitle">Sign in to your CRM</p>
    </div>
    <div class="login-form">
      <div class="login-field" id="name-field" style="display:none">
        <label>Full Name</label>
        <input type="text" id="login-name" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="login-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')handleAuth()">
      </div>
      <button class="login-btn" id="login-btn" onclick="handleAuth()">Sign In</button>
      <div style="display:flex;align-items:center;gap:10px;margin:14px 0 10px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:11px;color:var(--text-muted);font-weight:600">OR</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <button onclick="handleGoogleSignIn()" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s"
        onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='#fff'">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.09 24.09 0 0 0 0 21.56l7.98-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <div class="login-error" id="login-error"></div>
      <div style="text-align:center;margin-top:14px">
        <span id="auth-toggle" style="font-size:12px;color:var(--text-muted);cursor:pointer" onclick="toggleAuthMode()">
          Don't have an account? <strong style="color:var(--purple)">Sign up</strong>
        </span>
      </div>
      <div id="reset-link" style="text-align:center;margin-top:8px">
        <span style="font-size:11px;color:var(--text-muted);cursor:pointer" onclick="handlePasswordReset()">
          Forgot password?
        </span>
      </div>
    </div>
    <div style="text-align:center;margin-top:20px;font-size:10px;color:var(--text-muted)">
      Powered by The Headline Theory
    </div>
  </div>
</div>

<div id="app" style="display:none"></div>

<!-- JustCall Sales Dialer opens as popup via dialer.js -->

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<script src="service_area_data.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
