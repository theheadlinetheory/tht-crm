name: Verify & Deploy to Pages

# Every push to main runs the deploy guardrail FIRST. Pages only publishes if
# it passes — so a commit that deletes a feature or drifts a cache token can no
# longer reach the live client-facing CRM. (Replaces the old "legacy" Pages
# auto-build, which deployed every push with zero checks.)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run deploy guardrail
        run: node scripts/ci-check.mjs

  deploy:
    needs: verify          # ← deploy is skipped entirely if verify fails
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
